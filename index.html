<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Meta Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Website Icon (FIX PATH) -->
    <!-- ❌ Don't use local path -->
    <!-- ✔ Use relative path -->
    <link rel="icon" href="images/logo.png">

    <title>Spotify Web Player</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- MAIN CONTAINER -->
    <div class="main">

        <!-- SIDEBAR -->
        <div class="slidebar">

            <!-- NAVIGATION -->
            <div class="nav">
                <div class="nav-option">
                    <i class="fa-solid fa-house"></i>
                    <a href="#">Home</a>
                </div>

                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="Search.html">Search</a>
                </div>
            </div>

            <!-- LIBRARY SECTION -->
            <div class="library">

                <!-- Library Header -->
                <div class="options">
                    <div class="lib-option nav-option">
                        <!-- FIX IMAGE PATH -->
                        <img src="images/library_icon.png">
                        <a href="#">Your Library</a>   
                    </div>
                </div>

            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main_content">

            <!-- TOP NAVBAR -->
            <div class="sticky-nav">
                <div class="sticky-nav-icons">

                    <!-- FIX THESE PATHS -->
                    <img src="images/backward_icon.png">
                    <img src="images/forward_icon.png" class="hide">

                </div>
            </div>

            <!-- CARDS SECTION -->
            <h2>Recently Played</h2>

            <div class="cards-container">

                <div class="card">
                    <!-- FIX IMAGE -->
                    <img src="images/card1img.jpg" class="card-img">

                    <p class="card-title">Top 50 Global</p>
                    <p class="card-info">Most played tracks</p>
                </div>

            </div>

            <!-- AUDIO PLAYER -->
            <audio controls>
                <source src="song.mp3" type="audio/mpeg">
            </audio>

        </div>

        <!-- MUSIC PLAYER -->
        <div class="music-player">

            <div class="player-controls">
                <!-- FIX ALL THESE PATHS -->
                <img src="images/player_icon1.png">
                <img src="images/player_icon2.png">
                <img src="images/player_icon3.png">
            </div>

        </div>

        <!-- FOOTER -->
        <p class="copyright">
            &copy; 2024 Spotify Clone
        </p>

    </div>

</body>

<!-- SCRIPT -->
<script>
    function Search(){
        window.location = "Search.html";
    }
</script>

</html>
